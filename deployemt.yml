apiversion: apps/v1
kind: Deployment
metadata:
 name: nginx-deployment
spec:
 replicas: 3
 selector:
  matchlabels:
   app: nginx
   template:
    metadata:
     labels:
      app: nginx
    specs:
     containers:
     - name: nginx
       image: nginx:1.14.2
       ports:
       - containerPort: 80
